# DO NOT commit real values. Create the secret imperatively:
#
#   kubectl create secret generic agentregistry-secrets \
#     --from-literal=ConnectionStrings__Postgres="Host=...;Database=agentregistry;Username=agentregistry;Password=..." \
#     --from-literal=ConnectionStrings__Redis="...:6379,password=..." \
#     --from-literal=Jwt__Authority="https://your-idp/.well-known/openid-configuration" \
#     -n default
#
# The keys use double-underscore (__) which ASP.NET Core maps to ':' in configuration.
apiVersion: v1
kind: Secret
metadata:
  name: agentregistry-secrets
  namespace: default
type: Opaque
stringData:
  ConnectionStrings__Postgres: "REPLACE_ME"
  ConnectionStrings__Redis: "REPLACE_ME"
  Jwt__Authority: "REPLACE_ME"
